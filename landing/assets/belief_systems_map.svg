<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%" style="background:#090916; border-radius:12px; border:1px solid rgba(255,255,255,0.08); font-family:system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Radial Glow Filter -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-gold" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="grad-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff" />
      <stop offset="100%" stop-color="#0088cc" />
    </linearGradient>
    <linearGradient id="grad-magenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0055" />
      <stop offset="100%" stop-color="#990033" />
    </linearGradient>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff55" />
      <stop offset="100%" stop-color="#009933" />
    </linearGradient>
    <linearGradient id="grad-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffaa00" />
      <stop offset="100%" stop-color="#cc6600" />
    </linearGradient>
    <linearGradient id="grad-center" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#8888ff" />
    </linearGradient>
  </defs>

  <!-- Background Gradients (Subtle Space Feel) -->
  <circle cx="400" cy="300" r="280" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1" />
  <circle cx="400" cy="300" r="180" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" stroke-dasharray="5,5" />

  <!-- Connecting Lines from Center to Nodes -->
  <!-- 1. Neuroscience (400, 90) -->
  <line x1="400" y1="300" x2="400" y2="100" stroke="rgba(0, 255, 255, 0.3)" stroke-width="2" />
  <!-- 2. Psychology (580, 150) -->
  <line x1="400" y1="300" x2="580" y2="150" stroke="rgba(0, 255, 255, 0.3)" stroke-width="2" />
  <!-- 3. Biochemistry (660, 300) -->
  <line x1="400" y1="300" x2="660" y2="300" stroke="rgba(0, 255, 85, 0.3)" stroke-width="2" />
  <!-- 4. Somatic Therapy (580, 450) -->
  <line x1="400" y1="300" x2="580" y2="450" stroke="rgba(0, 255, 85, 0.3)" stroke-width="2" />
  <!-- 5. Clinical Practice (400, 500) -->
  <line x1="400" y1="300" x2="400" y2="500" stroke="rgba(255, 0, 85, 0.3)" stroke-width="2" />
  <!-- 6. Energy Work (220, 450) -->
  <line x1="400" y1="300" x2="220" y2="450" stroke="rgba(255, 0, 85, 0.3)" stroke-width="2" />
  <!-- 7. Spirituality (140, 300) -->
  <line x1="400" y1="300" x2="140" y2="300" stroke="rgba(255, 170, 0, 0.3)" stroke-width="2" />
  <!-- 8. Human Design (220, 150) -->
  <line x1="400" y1="300" x2="220" y2="150" stroke="rgba(255, 170, 0, 0.3)" stroke-width="2" />

  <!-- Outer Ring Connections (Flow of Deconditioning) -->
  <path d="M 400,100 Q 490,125 580,150 Q 620,225 660,300 Q 620,375 580,450 Q 490,475 400,500 Q 310,475 220,450 Q 180,375 140,300 Q 180,225 220,150 Q 310,125 400,100" 
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2" stroke-dasharray="4,4" />

  <!-- Center Node (The Unified Deconditioning Engine) -->
  <g transform="translate(400,300)">
    <circle cx="0" cy="0" r="50" fill="#0f0f2d" stroke="url(#grad-center)" stroke-width="3" filter="url(#glow-cyan)" />
    <text x="0" y="-8" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700" letter-spacing="1">UNIFIED</text>
    <text x="0" y="6" text-anchor="middle" fill="#00ffff" font-size="10" font-weight="700" letter-spacing="0.5">DECONDITIONING</text>
    <text x="0" y="18" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="500">ENGINE</text>
  </g>

  <!-- Node 1: Neuroscience -->
  <g transform="translate(400,100)">
    <circle cx="0" cy="0" r="35" fill="#090916" stroke="url(#grad-cyan)" stroke-width="2" filter="url(#glow-cyan)" />
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">NEURO</text>
    <!-- Info Box -->
    <rect x="-70" y="-70" width="140" height="28" rx="4" fill="rgba(0,0,0,0.8)" stroke="rgba(0,255,255,0.2)" stroke-width="1" />
    <text x="0" y="-52" text-anchor="middle" fill="#00ffff" font-size="9" font-weight="600">Neuroplasticity &amp; DMN</text>
  </g>

  <!-- Node 2: Psychology -->
  <g transform="translate(580,150)">
    <circle cx="0" cy="0" r="35" fill="#090916" stroke="url(#grad-cyan)" stroke-width="2" filter="url(#glow-cyan)" />
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">PSYCH</text>
    <!-- Info Box -->
    <rect x="-70" y="-70" width="140" height="28" rx="4" fill="rgba(0,0,0,0.8)" stroke="rgba(0,255,255,0.2)" stroke-width="1" />
    <text x="0" y="-52" text-anchor="middle" fill="#00ffff" font-size="9" font-weight="600">CBT Restructuring &amp; REBT</text>
  </g>

  <!-- Node 3: Biochemistry -->
  <g transform="translate(660,300)">
    <circle cx="0" cy="0" r="35" fill="#090916" stroke="url(#grad-green)" stroke-width="2" filter="url(#glow-green)" />
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">BIOCHEM</text>
    <!-- Info Box -->
    <rect x="-70" y="-70" width="140" height="28" rx="4" fill="rgba(0,0,0,0.8)" stroke="rgba(0,255,85,0.2)" stroke-width="1" />
    <text x="0" y="-52" text-anchor="middle" fill="#00ff55" font-size="9" font-weight="600">Epigenetics &amp; Peptides</text>
  </g>

  <!-- Node 4: Somatic Therapy -->
  <g transform="translate(580,450)">
    <circle cx="0" cy="0" r="35" fill="#090916" stroke="url(#grad-green)" stroke-width="2" filter="url(#glow-green)" />
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">SOMATIC</text>
    <!-- Info Box -->
    <rect x="-70" y="-70" width="140" height="28" rx="4" fill="rgba(0,0,0,0.8)" stroke="rgba(0,255,85,0.2)" stroke-width="1" />
    <text x="0" y="-52" text-anchor="middle" fill="#00ff55" font-size="9" font-weight="600">Polyvagal &amp; Somatic Storage</text>
  </g>

  <!-- Node 5: Clinical Practice -->
  <g transform="translate(400,500)">
    <circle cx="0" cy="0" r="35" fill="#090916" stroke="url(#grad-magenta)" stroke-width="2" filter="url(#glow-magenta)" />
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">CLINICAL</text>
    <!-- Info Box -->
    <rect x="-70" y="-70" width="140" height="28" rx="4" fill="rgba(0,0,0,0.8)" stroke="rgba(255,0,85,0.2)" stroke-width="1" />
    <text x="0" y="-52" text-anchor="middle" fill="#ff0055" font-size="9" font-weight="600">EFT Trials &amp; Kinesiology</text>
  </g>

  <!-- Node 6: Energy Work -->
  <g transform="translate(220,450)">
    <circle cx="0" cy="0" r="35" fill="#090916" stroke="url(#grad-magenta)" stroke-width="2" filter="url(#glow-magenta)" />
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">ENERGY</text>
    <!-- Info Box -->
    <rect x="-70" y="-70" width="140" height="28" rx="4" fill="rgba(0,0,0,0.8)" stroke="rgba(255,0,85,0.2)" stroke-width="1" />
    <text x="0" y="-52" text-anchor="middle" fill="#ff0055" font-size="9" font-weight="600">Meridians &amp; Emotion Code</text>
  </g>

  <!-- Node 7: Spirituality -->
  <g transform="translate(140,300)">
    <circle cx="0" cy="0" r="35" fill="#090916" stroke="url(#grad-gold)" stroke-width="2" filter="url(#glow-gold)" />
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">SPIRIT</text>
    <!-- Info Box -->
    <rect x="-70" y="-70" width="140" height="28" rx="4" fill="rgba(0,0,0,0.8)" stroke="rgba(255,170,0,0.2)" stroke-width="1" />
    <text x="0" y="-52" text-anchor="middle" fill="#ffaa00" font-size="9" font-weight="600">Samskaras &amp; Scripting</text>
  </g>

  <!-- Node 8: Human Design -->
  <g transform="translate(220,150)">
    <circle cx="0" cy="0" r="35" fill="#090916" stroke="url(#grad-gold)" stroke-width="2" filter="url(#glow-gold)" />
    <text x="0" y="4" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="600">HD MAP</text>
    <!-- Info Box -->
    <rect x="-70" y="-70" width="140" height="28" rx="4" fill="rgba(0,0,0,0.8)" stroke="rgba(255,170,0,0.2)" stroke-width="1" />
    <text x="0" y="-52" text-anchor="middle" fill="#ffaa00" font-size="9" font-weight="600">Bodygraph Deconditioning</text>
  </g>

  <!-- Key Legend at Bottom -->
  <g transform="translate(200, 565)">
    <circle cx="0" cy="0" r="5" fill="#00ffff" />
    <text x="10" y="4" fill="#8a8a9f" font-size="10">Neurological / Cognitive</text>
    
    <circle cx="150" cy="0" r="5" fill="#00ff55" />
    <text x="160" y="4" fill="#8a8a9f" font-size="10">Biomedical / Somatic</text>

    <circle cx="300" cy="0" r="5" fill="#ff0055" />
    <text x="310" y="4" fill="#8a8a9f" font-size="10">Clinical / Energetic</text>

    <circle cx="430" cy="0" r="5" fill="#ffaa00" />
    <text x="440" y="4" fill="#8a8a9f" font-size="10">Spiritual / Structural HD</text>
  </g>
</svg>
